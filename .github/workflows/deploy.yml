name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  quality:
    name: Quality frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high || echo "Audit encontró alertas. Revisar dependencias, pero no se bloquea el despliegue."

  unit_tests:
    name: Unit tests frontend
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: unit_tests
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build

  deploy:
    name: Deploy frontend to VPS
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" -i ~/.ssh/vps_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "/opt/yepez-rehab-center/deploy.sh frontend"
