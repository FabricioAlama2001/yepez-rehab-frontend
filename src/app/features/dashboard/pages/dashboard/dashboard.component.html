<h1 class="page-title">Dashboard</h1>
<p class="page-subtitle">Resumen del sistema interno de gestión de citas.</p>

@if (errorMessage) {
  <p-message severity="error" [text]="errorMessage" />
}

@if (loading) {
  <div class="card loading-state">
    <i class="pi pi-spin pi-spinner"></i>
    <span>Cargando resumen...</span>
  </div>
} @else {
  <div class="dashboard-grid">
    <p-card styleClass="metric-card">
      <div class="metric-content">
        <div>
          <span>Pacientes registrados</span>
          <strong>{{ totalPatients }}</strong>
        </div>

        <div class="metric-icon">
          <i class="pi pi-users"></i>
        </div>
      </div>
    </p-card>

    <p-card styleClass="metric-card">
      <div class="metric-content">
        <div>
          <span>Citas del día</span>
          <strong>{{ todayAppointments }}</strong>
        </div>

        <div class="metric-icon">
          <i class="pi pi-calendar-clock"></i>
        </div>
      </div>
    </p-card>

    <p-card styleClass="metric-card">
      <div class="metric-content">
        <div>
          <span>Citas canceladas</span>
          <strong>{{ cancelledAppointments }}</strong>
        </div>

        <div class="metric-icon danger">
          <i class="pi pi-times-circle"></i>
        </div>
      </div>
    </p-card>

    <p-card styleClass="metric-card">
      <div class="metric-content">
        <div>
          <span>Citas atendidas</span>
          <strong>{{ attendedAppointments }}</strong>
        </div>

        <div class="metric-icon success">
          <i class="pi pi-check-circle"></i>
        </div>
      </div>
    </p-card>
  </div>
}
