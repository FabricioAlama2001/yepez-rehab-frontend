<header class="topbar">
  <div class="topbar-brand">
    <div class="logo">
      <i class="pi pi-wave-pulse"></i></div>
    <div>
      <strong>Yépez Rehab Center</strong>
      <span>Sistema interno de gestión de citas</span>
    </div>
  </div>

  <div class="topbar-actions">
    @if (authService.getCurrentUser(); as user) {
      <div class="user-info">
        <p-avatar icon="pi pi-user" shape="circle" />
        <div>
          <strong>{{ user.fullName || user.name || user.email }}</strong>
          <span>{{ user.role }}</span>
        </div>
      </div>
    }

    <p-button
      label="Cerrar sesión"
      icon="pi pi-sign-out"
      severity="secondary"
      [outlined]="true"
      (onClick)="logout()"
    />
  </div>
</header>
